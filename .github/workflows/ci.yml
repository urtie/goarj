name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOARJ_REQUIRE_INTEROP: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install reference ARJ implementation
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends arj
          command -v arj

      - name: Verify LFS test fixtures are present
        run: |
          if grep -RIl --include='*.arj' 'https://git-lfs.github.com/spec/v1' testdata; then
            echo "Found Git LFS pointer files in testdata; fixtures were not downloaded."
            exit 1
          fi

      - name: Run tests
        run: go test ./...
